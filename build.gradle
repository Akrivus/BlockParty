plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '1.0.11'
}

version = new Date().format('yy.MM.dd')
group = 'block_party'
base {
    archivesName = 'BlockParty'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    maven {
        name = 'Mojang'
        url = 'https://libraries.minecraft.net'
    }
    mavenCentral()
}

dependencies {
    implementation 'org.xerial:sqlite-jdbc:3.40.1.0'
    jarJar 'org.xerial:sqlite-jdbc:[3.40.1.0,3.41)'
}

sourceSets {
    main {
        // NeoForge 1.21.4 build spike: compile only the minimal loader/test stub.
        java.srcDirs = ['src/neoforgeSpike/java']
        resources.srcDirs = ['src/neoforgeSpike/resources', layout.buildDirectory.dir('generated/neoforgeSpikeResources')]
    }
    test {
        // Legacy Forge regression tests target 1.19.4 APIs and are disabled for this spike.
        java.srcDirs = []
        resources.srcDirs = []
    }
}

tasks.register('syncNeoForgeSpikeResources', Sync) {
    into layout.buildDirectory.dir('generated/neoforgeSpikeResources')

    from('src/main/resources') {
        include 'assets/block_party/**'
        include 'data/block_party/moes/**'
        include 'data/block_party/scenes/**'
        exclude 'assets/block_party/textures/gui/**'
    }

    from('src/main/resources/data/block_party/tags/blocks') {
        into 'data/block_party/tags/block'
    }

    from('src/main/resources/data/block_party/tags/items') {
        into 'data/block_party/tags/item'
    }
}

tasks.named('processResources') {
    dependsOn tasks.named('syncNeoForgeSpikeResources')
}

neoForge {
    version = '21.4.102-beta'

    runs {
        client {
            client()
            gameDirectory = project.file('run-neoforge-spike')
        }
        server {
            server()
            gameDirectory = project.file('run-neoforge-spike')
        }
        gameTestServer {
            type = 'gameTestServer'
            gameDirectory = project.file('run-neoforge-spike')
            systemProperty 'neoforge.enabledGameTestNamespaces', 'block_party'
        }
        data {
            data()
            gameDirectory = project.file('run-neoforge-spike')
            programArguments.addAll '--mod', 'block_party', '--all', '--output', file('src/generated/resources/').absolutePath
        }
    }

    mods {
        block_party {
            sourceSet sourceSets.main
        }
    }
}
